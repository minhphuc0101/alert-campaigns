name: Weekly Formula Audit

on:
  schedule:
    # Run every Tuesday at 02:00 UTC (09:00 AM Vietnam Time)
    - cron: '0 2 * * 2'
  workflow_dispatch: # Allows manual trigger

jobs:
  run-formula-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install gspread oauth2client python-dotenv pandas
          
      - name: Run Formula Check and Send Email
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          EMAIL_SENDER_ADDRESS: ${{ secrets.EMAIL_SENDER_ADDRESS }}
          EMAIL_SENDER_PASSWORD: ${{ secrets.EMAIL_SENDER_PASSWORD }}
        run: python formula_alert.py
